name: Publish Luhmann Archive
on:
  push:
    branches:
      - main

# Disse linjer giver robotten lov til at skrive til GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - run: pip install mkdocs-material mkdocs-roamlinks-plugin
      
      # Denne kommando sørger for selve udrulningen
      - run: mkdocs gh-deploy --force